name: Update AI Events (Tue & Fri)

on:
  # Run automatically twice a week: Tuesday and Friday at 9 AM PT (17:00 UTC)
  schedule:
    - cron: '0 17 * * 2'   # Tuesday  9:00 AM PDT
    - cron: '0 17 * * 5'   # Friday   9:00 AM PDT

  # Allow manual trigger from GitHub Actions UI at any time
  workflow_dispatch:

permissions:
  contents: write   # needed to push updated events_data.js back to the repo

jobs:
  scrape-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      # 1. Check out the repository (full history for git push)
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Set up Python 3.11
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 3. Install Python dependencies
      - name: Install Python dependencies
        run: |
          pip install --quiet requests beautifulsoup4 openai python-dateutil

      # 4. Restore seen_events cache (so we don't re-process old events)
      - name: Restore seen_events cache
        uses: actions/cache@v4
        with:
          path: scripts/seen_events.json
          key: seen-events-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            seen-events-${{ runner.os }}-

      # 5. Run the scraper (uses OPENAI_API_KEY secret)
      - name: Run Luma scraper
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python scripts/scrape_luma.py

      # 6. Update the "Last Updated" timestamp in index.html
      - name: Update last-updated timestamp
        run: |
          DATE=$(date +'%b %d, %Y')
          sed -i "s|<strong>Updated:</strong> [^<]*|<strong>Updated:</strong> ${DATE}|g" site/index.html || true

      # 7. Commit and push updated data files if changed
      - name: Commit updated events data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add site/events_data.js site/index.html
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "chore: auto-update events $(date +'%Y-%m-%d')"
          git push

      # 8. Deploy site/ folder to GitHub Pages (gh-pages branch)
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          publish_branch: gh-pages
          commit_message: "deploy: refresh events $(date +'%Y-%m-%d')"
